# OpenSpine — local development stack.
# `docker compose up -d` brings up Postgres, Redis Streams, Qdrant, and Ollama.
# The application itself is run directly (`make run` or `uvicorn`) for fast
# iteration; production builds will package it as another service.

services:
  postgres:
    image: postgres:16-alpine
    container_name: openspine-postgres
    environment:
      POSTGRES_DB: openspine
      POSTGRES_USER: openspine
      POSTGRES_PASSWORD: openspine_dev_only
    ports:
      - "5432:5432"
    volumes:
      - openspine_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openspine -d openspine"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: openspine-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - openspine_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: openspine-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - openspine_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    # Local embeddings runtime. Pull the embedding model after the container
    # is up: `docker exec openspine-ollama ollama pull qwen3-embedding:0.6b`.
    # Qwen3-Embedding-0.6B: 1024-d, ~640 MB, MTEB-multilingual 64.33.
    # Alternative: any OpenAI-compatible /v1/embeddings server (e.g.
    # `llama-server -m Qwen3-Embedding-0.6B-Q8_0.gguf --embedding`).
    image: ollama/ollama:latest
    container_name: openspine-ollama
    ports:
      - "11434:11434"
    volumes:
      - openspine_ollama_data:/root/.ollama

volumes:
  openspine_postgres_data:
  openspine_redis_data:
  openspine_qdrant_data:
  openspine_ollama_data:
