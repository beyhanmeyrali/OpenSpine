name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest (smoke + unit, no infra required)
        run: pytest -v -m "not integration"

  integration-tests:
    name: Integration tests (Postgres + Redis + Qdrant)
    runs-on: ubuntu-latest
    needs: lint-and-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openspine
          POSTGRES_USER: openspine
          POSTGRES_PASSWORD: openspine_dev_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openspine -d openspine"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "bash -c '</dev/tcp/localhost/6333'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      OPENSPINE_DB_HOST: localhost
      OPENSPINE_DB_PORT: "5432"
      OPENSPINE_DB_NAME: openspine
      OPENSPINE_DB_USER: openspine
      OPENSPINE_DB_PASSWORD: openspine_dev_only
      OPENSPINE_REDIS_URL: redis://localhost:6379/0
      OPENSPINE_QDRANT_URL: http://localhost:6333
      # Ollama isn't started in CI — readiness will report it as down,
      # which is acceptable for the optional-dep contract. Tests that
      # need embeddings skip when Ollama isn't reachable.
      OPENSPINE_OLLAMA_URL: http://localhost:11434
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core + example plugin
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e examples/openspine-plugin-example/

      - name: Apply migrations
        run: alembic upgrade head

      - name: Pytest (integration only)
        run: pytest -v -m integration

  build-image:
    name: Build container image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: openspine:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
